# Doser Docker Compose
# For running Doser with Docker Compose

version: '3.8'

services:
  doser:
    build: .
    container_name: doser
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./accounts:/app/accounts
      - ./proxies.txt:/app/proxies.txt:ro
      - ./.env:/app/.env:ro
    environment:
      - PYTHONUNBUFFERED=1
      - DISPLAY=:99
    # For GUI mode (requires X11 forwarding on Linux)
    # environment:
    #   - DISPLAY=${DISPLAY}
    # volumes:
    #   - /tmp/.X11-unix:/tmp/.X11-unix:rw
    # network_mode: host
    command: python cli.py --headless --token "${TELEGRAM_BOT_TOKEN}" --count 1
    restart: unless-stopped
    
  # Optional: Selenium Grid for distributed automation
  selenium-hub:
    image: selenium/hub:latest
    container_name: selenium-hub
    ports:
      - "4444:4444"
    environment:
      - GRID_MAX_SESSION=16
      - GRID_BROWSER_TIMEOUT=300
      - GRID_TIMEOUT=300
    profiles:
      - grid
      
  chrome-node:
    image: selenium/node-chrome:latest
    container_name: chrome-node
    depends_on:
      - selenium-hub
    environment:
      - HUB_HOST=selenium-hub
      - HUB_PORT=4444
      - NODE_MAX_INSTANCES=2
      - NODE_MAX_SESSION=2
    volumes:
      - /dev/shm:/dev/shm
    profiles:
      - grid
